# BlueKiwi Dev Stack — DB + App (hot-reload)
# Usage: docker compose -f docker/docker-compose.dev.yml up [-d]

services:
  # ─── PostgreSQL 16 ───
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bluekiwi
      POSTGRES_USER: bluekiwi
      POSTGRES_PASSWORD: bluekiwi_dev_2026
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bluekiwi"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── WebSocket Relay ───
  ws-relay:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "${WS_PORT:-3001}:3001"
    command: ["npx", "tsx", "scripts/ws-relay.ts"]
    environment:
      WS_PORT: "3001"
    volumes:
      - ..:/app
      - /app/node_modules

  # ─── Next.js App (dev mode with hot-reload) ───
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3100}:3000"
    env_file:
      - ../.env.local
    environment:
      DATABASE_URL: postgresql://bluekiwi:bluekiwi_dev_2026@db:5432/bluekiwi
      WS_RELAY_URL: http://ws-relay:3001
      TEAM_NAME: ${TEAM_NAME:-}
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ..:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy
      ws-relay:
        condition: service_started

volumes:
  pgdata:
