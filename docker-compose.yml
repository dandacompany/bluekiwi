# docker-compose.yml — BlueKiwi self-host template
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bluekiwi
      POSTGRES_USER: bluekiwi
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bluekiwi"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    image: ghcr.io/dandacompany/bluekiwi:${BLUEKIWI_VERSION:-latest}
    ports:
      - "${APP_PORT:-3100}:3000"
    environment:
      DATABASE_URL: postgresql://bluekiwi:${DB_PASSWORD}@db:5432/bluekiwi
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      PUBLIC_URL: ${PUBLIC_URL:-}
      TEAM_NAME: ${TEAM_NAME:-}
      BLUEKIWI_VERSION: ${BLUEKIWI_VERSION:-latest}
      WS_RELAY_URL: http://ws-relay:3001
    depends_on:
      db:
        condition: service_healthy
      ws-relay:
        condition: service_started

  ws-relay:
    image: ghcr.io/dandacompany/bluekiwi:${BLUEKIWI_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${WS_PORT:-3001}:3001"
    command: ["node", "scripts/ws-relay.js"]
    environment:
      WS_PORT: "3001"

volumes:
  pgdata:
