name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Build MCP
        run: |
          cd mcp
          npm ci
          npm run build
      - name: Build CLI
        run: npm run build:cli
      - name: Run MCP unit tests
        run: cd mcp && npx vitest run tests/api-client.test.ts
      - name: Run root unit tests
        run: npm test

  quickstart-ui-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Run Quick Start HITL + VS smoke
        run: |
          TARGET_PORT=3510 \
          TARGET_URL=http://127.0.0.1:3510 \
          SQLITE_PATH=/tmp/bluekiwi-ci-smoke/data/bluekiwi.sqlite \
          PW_HEADLESS=1 \
          SERVER_MODE=start \
          AUTO_START_SERVER=1 \
          bash tests/4/run-hitl-vs-ui-smoke.sh

  admin-maintenance-sqlite-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Run admin / maintenance SQLite smoke
        run: |
          TARGET_PORT=3520 \
          TARGET_URL=http://127.0.0.1:3520 \
          SQLITE_PATH=/tmp/bluekiwi-admin-ci/data/bluekiwi.sqlite \
          SERVER_MODE=start \
          AUTO_START_SERVER=1 \
          bash tests/4/run-admin-maintenance-sqlite-smoke.sh

  packaged-cli-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Run packaged CLI smoke
        run: |
          PORT=3530 \
          AUTO_BUILD=1 \
          bash tests/4/run-packaged-cli-smoke.sh

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: bluekiwi:ci
